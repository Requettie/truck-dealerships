<html><head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>HeavyHaul Trucks | contact</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        .bg-brand-primary { background-color: #111827; }
        .text-brand-primary { color: #111827; }
        .border-brand-primary { border-color: #111827; }
        .bg-brand-accent { background-color: #facc15; }
        .text-brand-accent { color: #facc15; }
    </style>
</head><body><nav class='bg-white shadow-md p-4 sticky top-0 z-50'>
    <div class='container mx-auto flex justify-between items-center'>
        <a href='index.html' class='text-2xl font-bold text-brand-primary'>HeavyHaul Trucks</a>
        <div class='space-x-6 font-medium text-gray-600'>
            <a href='index.html' class='hover:text-brand-primary'>Home</a>
            <a href='about.html' class='hover:text-brand-primary'>About</a>
            <a href='services.html' class='hover:text-brand-primary'>Services</a>
            <a href='contact.html' class='hover:text-brand-primary'>Contact</a>
        </div>
    </div>
</nav><main class='py-20 px-4'>
    <div class='container mx-auto max-w-2xl'>
        <h1 class='text-4xl font-bold mb-8 text-center'>Get In Touch</h1>
        <form id="contact-form" class="space-y-6 bg-white p-8 rounded-2xl shadow-lg">
            <div class='grid md:grid-cols-2 gap-6'>
                <div>
                    <label class='block text-sm font-medium text-gray-700 mb-1'>Name</label>
                    <input type='text' class='w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-primary outline-none' id="name" placeholder="Your Name">
                </div>
                <div>
                    <label class='block text-sm font-medium text-gray-700 mb-1'>Email</label>
                    <input type='email' class='w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-primary outline-none' id="email" placeholder="email@example.com">
                </div>
            </div>
            <div>
                <label class='block text-sm font-medium text-gray-700 mb-1'>Message</label>
                <textarea rows='5' class='w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-primary outline-none' id="message" placeholder="How can we help you?"></textarea>
            </div>
            <button type='submit' class='w-full bg-brand-primary text-white py-3 rounded-lg font-bold hover:opacity-90 transition'>Send Message</button>
        </form>
    </div>
</main><footer class='bg-gray-900 text-white py-10'>
    <div class='container mx-auto text-center'>
        <p class='text-lg font-bold mb-2'>HeavyHaul Trucks</p>
        <p class='text-gray-400'>&copy; 2026 HeavyHaul Trucks. All rights reserved.</p>
    </div>
</footer>
    <script>
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Sending...';

            const data = {
                brandId: 'truck-dealerships',
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('http://localhost:5000/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Success: ' + result.message);
                    e.target.reset();
                } else {
                    alert('Error: ' + (result.errors ? result.errors[0].msg : result.message));
                }
            } catch (error) {
                alert('Error connecting to server. Please try again later.');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body></html>
